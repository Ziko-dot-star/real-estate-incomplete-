<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Wisdom Shelter</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="images/WISDOM.png" alt="Wisdom Shelter">
                <p style="color: #888; font-size: 12px; margin-top: 5px;">ADMIN PANEL</p>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fas fa-chart-pie"></i> Overview</a></li>
                <li><a href="#staff-section"><i class="fas fa-users-cog"></i> Staff Management</a></li>
                <li><a href="#property-section"><i class="fas fa-building"></i> Property Updates</a></li>
                <li><a href="#"><i class="fas fa-envelope"></i> Inquiries</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> System Settings</a></li>
                <li class="logout"><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <h1>Admin Dashboard</h1>
                    <p>System Overview & Control</p>
                </div>
                <div class="top-actions">
                    <button class="notification-btn"><i class="fas fa-bell"></i><span class="badge">5</span></button>
                    <div class="admin-profile" style="display: flex; align-items: center; gap: 10px;">
                        <span id="adminName" style="font-weight: 600;">Super Admin</span>
                        <img src="images/temp.jpg" alt="Admin" class="profile-img">
                    </div>
                </div>
            </header>

            <!-- Admin Stats -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon property" style="background: rgba(0, 123, 255, 0.1); color: #007bff;"><i class="fas fa-users"></i></div>
                    <div class="stat-details">
                        <h3 id="totalStaffCount">0</h3>
                        <p>Total Staffs</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon investment" style="background: rgba(40, 167, 69, 0.1); color: #28a745;"><i class="fas fa-building"></i></div>
                    <div class="stat-details">
                        <h3 id="totalPropertyCount">0</h3>
                        <p>Live Properties</p>
                    </div>
                </div>
            </section>

            <!-- Staff Management Section -->
            <section id="staff-section" class="content-section">
                <div class="section-header">
                    <h2>Staff Management</h2>
                    <button class="action-btn btn-add" id="addStaffBtn"><i class="fas fa-user-plus"></i> Add New Staff</button>
                </div>
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Staff Name</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000/api';

        async function fetchData() {
            try {
                // Fetch Staff
                const staffRes = await fetch(`${API_URL}/staff`);
                const staff = await staffRes.json();
                renderStaff(staff);

                // Fetch Properties (simple count for now)
                const propRes = await fetch(`${API_URL}/properties`);
                const props = await propRes.json();
                document.getElementById('totalPropertyCount').innerText = props.length;
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function renderStaff(staff) {
            const tbody = document.getElementById('staffTableBody');
            tbody.innerHTML = '';
            document.getElementById('totalStaffCount').innerText = staff.length;

            staff.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${s.image_url}" class="staff-img"> ${s.name}</td>
                    <td>${s.role}</td>
                    <td><span class="status-badge ${s.status === 'Active' ? 'status-active' : 'status-offline'}">${s.status}</span></td>
                    <td>${s.joined_date}</td>
                    <td>
                        <button class="action-btn btn-remove" onclick="deleteStaff(${s.id})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteStaff(id) {
            if (!confirm("Are you sure you want to remove this staff?")) return;
            try {
                const res = await fetch(`${API_URL}/staff/${id}`, { method: 'DELETE' });
                if (res.ok) fetchData();
            } catch (err) {
                console.error("Delete Error:", err);
            }
        }

        document.getElementById('addStaffBtn').addEventListener('click', async () => {
            const name = prompt("Enter Staff Name:");
            const role = prompt("Enter Staff Role:");
            if (!name || !role) return;

            const joined_date = new Date().toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });

            try {
                const res = await fetch(`${API_URL}/staff`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, role, joined_date })
                });
                if (res.ok) fetchData();
            } catch (err) {
                console.error("Add Staff Error:", err);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        // Auth check
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('adminName').innerText = user.fullname;
            fetchData();
        }
    </script>
</body>
</html>
